<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Mobile-first viewport: cover the notch, lock zoom so taps feel native -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <!-- iOS standalone PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sales" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Apple touch icon (generated by `npm run icons`) -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <title>Grocery Sales</title>
  </head>
  <body>
    <div id="root">
      <!-- Boot fallback: React clears this on mount. If it stays on screen,
           the app didn't mount (stale cache or a runtime error). -->
      <div id="boot-fallback" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#94a3b8;font-family:-apple-system,system-ui,sans-serif;text-align:center;padding:24px">
        <div style="width:56px;height:56px;border-radius:18px;display:grid;place-items:center;font-size:28px;background:linear-gradient(135deg,#34d399,#10b981)">🛒</div>
        <div style="font-size:14px">Loading…</div>
        <div style="font-size:11px;color:#475569">build YR-4 · if this stays, tap ••• ▸ Reload</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Self-heal: if a stale service worker leaves the app unmounted (blank
         screen after a deploy), clear the SW + caches once and reload. -->
    <script>
      (function () {
        var KEY = '__selfheal__';
        setTimeout(function () {
          // The boot fallback is removed by React on a successful mount.
          if (!document.getElementById('boot-fallback')) return;
          if (sessionStorage.getItem(KEY)) return;
          sessionStorage.setItem(KEY, '1');
          var reload = function () { location.reload(); };
          try {
            var jobs = [];
            if ('serviceWorker' in navigator) {
              jobs.push(navigator.serviceWorker.getRegistrations().then(function (rs) {
                return Promise.all(rs.map(function (r) { return r.unregister(); }));
              }));
            }
            if (window.caches) {
              jobs.push(caches.keys().then(function (ks) {
                return Promise.all(ks.map(function (k) { return caches.delete(k); }));
              }));
            }
            Promise.all(jobs).then(reload, reload);
          } catch (e) { reload(); }
        }, 5000);
      })();
    </script>
  </body>
</html>
