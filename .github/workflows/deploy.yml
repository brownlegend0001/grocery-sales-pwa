name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Generate PNG icons from the SVG (sharp).
      - run: npm run icons

      # base must match the Pages sub-path: https://<user>.github.io/<repo>/
      - name: Build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_SHEETS_API: ${{ secrets.VITE_SHEETS_API }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_ALLOWED_EMAIL: ${{ vars.VITE_ALLOWED_EMAIL || 'brownlegend0001@gmail.com' }}
          VITE_YEAR: ${{ vars.VITE_YEAR || '2026' }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
